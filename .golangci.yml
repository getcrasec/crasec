version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec

  settings:
    errcheck:
      # Report on assignment of errors to blank identifier: _ = f()
      check-blank: true

    govet:
      enable-all: true
      disable:
        # Field order in these structs is chosen for human-readable JSON
        # output (SBOM/VEX/Annex VII/EU DoC field order matters to the
        # auditors reading them); the memory-layout win doesn't matter for
        # a one-shot CLI, so it's not worth reordering for this.
        - fieldalignment

    gosec:
      excludes:
        # Unhandled errors — errcheck already covers this, avoids duplicate noise
        - G104

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
